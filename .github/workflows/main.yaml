name: Github AWS OIDC
on:
  push:
    branches: [main]

# Need ID token write permission to use OIDC
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true      
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ID }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_URL }}
      CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ID }}
      CDK_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.22'
      
      - name: Build
        run: make build

      - name: Deploy
        run: cd infra && npm ci && npx cdk deploy --all --require-approval never --outputs-file /dev/null
      
      - name: Run migrations
        run: aws lambda invoke --function-name dj-sets-migrate --payload '{}' response.json && cat response.json      